<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
<title>WEPLE</title>
</head>
<body>

	<section>
		<div class="worktime-container">
			<div class="page-header">
				<h3>소요시간 등록</h3>
			</div>

			<form th:action="@{/insertProjectTime}" th:object="${workTimeVO}" method="post" class="insert-form">
				<div class="form-group">
				    <label>프로젝트</label>
				    <input type="text" class="form-control" th:value="${currentProject.projectTitle}" readonly>
				    <input type="hidden" th:field="*{projectId}">
				</div>

				<div class="form-group">
					<label>일감</label>
					<div class="input-inline">
						<select id="taskSelect" th:field="*{taskId}" class="form-control" onchange="updateDescription(this)">
						    <option value="" disabled selected hidden>일감을 선택하세요.</option>
						    <option th:each="t : ${taskList}"
						    		th:value="${t.taskId}"
						    		th:text="${t.taskTitle}"
						    		th:attr="data-describe=${t.taskDescribe}"></option>
						</select>
					</div>
				</div>

				<div class="form-group">
					<label>사용자 <span>*</span></label>
					<input type="text" name="userCode" placeholder="사용자를 입력하세요." required>
				</div>

				<div class="form-group">
					<label>작업일자 <span>*</span></label> <input type="date"
						name="workDate" required>
				</div>

				<div class="form-group">
					<label>소요시간 <span>*</span></label> <input type="number"
						name="spentHour" step="0.1" placeholder="시간을 입력하세요." required>
				</div>

				<div class="form-group">
				    <label>설명</label>
				    <input type="text" id="taskDescribeInput" class="form-control" readonly placeholder="일감을 선택하면 표시됩니다">
				</div>

				<div class="form-group">
					<label>작업분류 <span>*</span></label>
					<select name="workNameLabel" class="form-control" required>
					    <option value="" disabled selected hidden>작업분류를 선택하세요.</option>
					    <option th:each="v : ${workTypeList}" 
				            	th:value="${v.taskClassificationId}" 
				            	th:text="${v.workName != null ? v.workName : v.priorityName}"> </option>
					</select>
				</div>

				<div class="form-group">
					<label>진척도</label>
					<div class="progress-area">
						<input type="range" name="progress" min="0" max="100"> <span>0%</span>
					</div>
				</div>

				<div class="btn-area">
					<button type="button" class="btn btn-light"
						onclick="history.back()">취소</button>
					<button type="submit" class="btn btn-primary">등록</button>
				</div>
			</form>
		</div>

		<script>
		function updateDescription(selectElement) {
		    const taskId = selectElement.value;
		    if (!taskId) return;

		    // 서버에 해당 taskId의 상세정보를 요청
		    fetch(`/getTaskDetail?taskId=${taskId}`)
		        .then(response => response.json())
		        .then(data => {
		            // 가져온 데이터에서 설명만 추출하여 넣기
		            document.getElementById('taskDescribeInput').value = data.taskDescribe || '';
		        })
		        .catch(error => console.error('Error:', error));
		}
		</script>
		<style>
.worktime-container {
	width: 800px;
	margin: 40px auto;
}

.page-header h3 {
	font-size: 20px;
	font-weight: bold;
	margin-bottom: 20px;
}

.insert-form {
	background: #fff;
	padding: 30px;
	border: 1px solid #e2e2e2;
	border-radius: 6px;
}

.form-group {
	display: flex;
	align-items: center;
	margin-bottom: 15px;
}

.form-group label {
	width: 120px;
	font-weight: 600;
}

.form-group label span {
	color: #d32f2f;
}

.form-group input, .form-group textarea {
    flex: 1;
    height: 38px; 
    padding: 0 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
}

.form-group select {
    flex: 1;
    height: auto; /* select는 고정 높이를 주지 않는 것이 안전합니다 */
    min-height: 38px; /* 최소 높이만 유지 */
    padding: 5px 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
}

.form-group textarea {
	height: auto;
	padding: 10px;
}

.input-inline {
	flex: 1;
	display: flex;
	align-items: center;
	gap: 10px;
}

.text-info {
	color: #1976d2;
	font-size: 13px;
}

.progress-area {
	flex: 1;
	display: flex;
	align-items: center;
	gap: 15px;
}

.btn-area {
	display: flex;
	justify-content: flex-end;
	gap: 10px;
	margin-top: 30px;
}
</style>
	</section>

</body>
</html>
